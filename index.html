<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamFlix — Início</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<nav>
  <a href="index.html" class="nav-logo">STREAMFLIX</a>
  <div class="nav-links">
    <a href="index.html">Início</a>
    <a href="explorar.html">Explorar</a>
    <a href="trending.html">Em Alta</a>
    <a href="sobre.html">Sobre</a>
  </div>
  <div class="nav-right" id="nav-right">
    <a href="login.html" class="btn btn-primary btn-sm">Entrar</a>
  </div>
</nav>

<main class="page">
  <section class="hero">
    <div class="hero-bg"></div>
    <div id="hero-bg-img" class="hero-bg-img"></div>
    <div class="hero-gradient"></div>
    <div class="hero-content" id="hero-content">
      <div class="hero-badge" id="hero-badge">Série</div>
      <h1 class="hero-title" id="hero-title">Carregando...</h1>
      <p class="hero-desc" id="hero-desc"></p>
      <div class="hero-actions">
        <button class="btn btn-primary" id="hero-play">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
          Assistir
        </button>
        <button class="btn btn-ghost" id="hero-fav">+ Lista</button>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Continuar Assistindo</h2>
      <a href="explorar.html" class="section-more">Ver tudo →</a>
    </div>
    <div class="cards-row" id="continue-row"></div>
  </section>

  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Séries</h2>
      <a href="explorar.html" class="section-more">Ver tudo →</a>
    </div>
    <div class="cards-row" id="series-row"></div>
  </section>

  <section class="section">
    <div class="section-header">
      <h2 class="section-title">Filmes</h2>
      <a href="explorar.html" class="section-more">Ver tudo →</a>
    </div>
    <div class="cards-row" id="filmes-row"></div>
  </section>

  <section class="section" style="padding-bottom: 60px;">
    <div class="section-header">
      <h2 class="section-title">Animes & Docs</h2>
      <a href="explorar.html" class="section-more">Ver tudo →</a>
    </div>
    <div class="cards-row" id="extras-row"></div>
  </section>
</main>

<div id="admin-bar" class="admin-bar">
  <strong>★ Modo Admin</strong>
  <span>·</span>
  <span>Gerencie o catálogo em</span>
  <a href="config.html" class="btn btn-ghost btn-sm">Configurações</a>
</div>

<div class="modal-overlay" id="content-modal">
  <div class="modal">
    <div class="modal-header">
      <h2 class="modal-title" id="modal-title">Título</h2>
      <button class="modal-close" id="modal-close" type="button">✕</button>
    </div>

    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:16px">
      <span id="modal-type" style="font-size:13px;color:var(--accent);font-weight:600"></span>
      <span style="color:var(--text-muted)">·</span>
      <span id="modal-year" style="font-size:13px;color:var(--text-muted)"></span>
      <span style="color:var(--text-muted)">·</span>
      <span id="modal-rating" style="font-size:13px;color:#f5a623;font-weight:600"></span>
      <span style="color:var(--text-muted)">·</span>
      <span id="modal-genre" style="font-size:13px;color:var(--text-muted)"></span>
    </div>

    <p id="modal-desc" style="font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:24px"></p>

    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-primary" id="modal-watch-btn" type="button">▶ Assistir</button>
      <button class="btn btn-ghost" id="modal-fav-btn" type="button">+ Adicionar</button>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/script.js"></script>
</body>
</html>
